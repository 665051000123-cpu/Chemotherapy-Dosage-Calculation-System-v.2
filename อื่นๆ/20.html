<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
#erd { overflow-x: auto; padding: 12px; background: #DCEEFA; border: 2px solid #7B4FA6; border-radius: 12px; }
</style>
<h2 class="sr-only">แผนภาพความสัมพันธ์ฐานข้อมูลระบบยา ธีมสีน้ำเงินกรมท่าและม่วง</h2>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: false,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: '#7B4FA6',
    textColor: '#12203F',
    primaryColor: '#5B8FD6',
    primaryBorderColor: '#12203F',
    primaryTextColor: '#FFFFFF',
    secondaryColor: '#AFD8F5',
    tertiaryColor: '#DCEEFA',
    attributeBackgroundColorOdd: '#EAF4FC',
    attributeBackgroundColorEven: '#D2E8F8',
  },
});
const src = `erDiagram
  USERS ||--o{ LOGIN : "employee_id"
  USERS ||--o{ ACTIVITY_LOGS : "employee_id"
  PATIENTS ||--o{ ORDER_LOGS : "hn"
  PATIENTS ||--o{ DOSAGE_LOGS : "hn"
  PATIENTS ||--o{ DOSE_LOGS : "hn"
  PATIENTS ||--o{ PRINT_LOGS : "hn"
  DRUGS }o--|| SOLVENTS : "solvent"
  DRUGS ||--o{ DOSAGE_LOGS : "drugs_used"
  DRUGS ||--o{ DOSE_LOGS : "drug_id"

  USERS {
    int id PK
    string employee_id
    string username
    string password
    string role
  }
  LOGIN {
    int id PK
    string username
    string employee_id FK
    string password
    string role
    bool must_change_password
    bool is_active
    string default_printer
  }
  PATIENTS {
    string hn PK
    string name
    string gender
    string age
    string height
    string weight
    string title
    text allergies
    string ward
    string doctor
  }
  DRUGS {
    int drug_id PK
    string drug_code
    string drug_name
    string drug_category
    string calculation_type
    decimal standard_dose_value
    string solvent FK
    string admin_route
    decimal cost_price
  }
  SOLVENTS {
    int solvent_id PK
    string solvent_name
    bool is_active
    datetime created_at
  }
  ACTIVITY_LOGS {
    int id PK
    string timestamp
    string employee_id FK
    string username
    string action_type
    text details
  }
  ORDER_LOGS {
    int id PK
    string timestamp
    string hn FK
    string patient_name
    string ward
    string user_name
    string doctor
    text order_details
    string cycle
  }
  DOSAGE_LOGS {
    int id PK
    string timestamp
    string hn FK
    string patient_name
    text calculated_bsa
    text formula_used
    text prescribed_dose
    text drugs_used
    string doctor
  }
  DOSE_LOGS {
    int id PK
    string timestamp
    string hn FK
    string patient_name
    decimal calculated_bsa
    string formula_used
    string prescribed_dose
    text clinical_note
  }
  PRINT_LOGS {
    int id PK
    string hn FK
    string patient_name
    string title
    string printer_name
    string paper_size
    bool is_a4
    string printed_by
  }
`;
const { svg } = await mermaid.render('erd-svg', src);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});

// Fix z-order: raise every text element above its sibling row-background rects
document.querySelectorAll('#erd svg.erDiagram text').forEach(t => {
  t.parentNode.appendChild(t);
});
</script>
